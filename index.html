<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOEIC 字彙工具</title>
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

  <header>
    <div class="site-title">TOEIC <span>字彙工具</span></div>
    <div class="header-right">
      <select id="accent-select" title="選擇腔調">
        <option value="en-US">🇺🇸 美國</option>
        <option value="en-GB">🇬🇧 英國</option>
        <option value="en-CA">🇨🇦 加拿大</option>
        <option value="en-AU">🇦🇺 澳洲</option>
      </select>
      <nav>
        <button class="nav-btn active" data-view="library">字庫頁</button>
        <button class="nav-btn" data-view="review">複習頁</button>
        <button class="nav-btn" data-view="article">文章頁</button>
      </nav>
    </div>
  </header>

  <main>

    <!-- ===== 字庫頁 ===== -->
    <section id="library-view">
      <div class="controls">
        <input type="search" id="search-input" placeholder="搜尋單字或中文意思…" />
        <select id="sort-select">
          <option value="alpha-az">字母 A → Z</option>
          <option value="alpha-za">字母 Z → A</option>
          <option value="date-new">日期（最新）</option>
          <option value="date-old">日期（最舊）</option>
        </select>
        <button class="btn btn-outline" id="export-csv">匯出 CSV</button>
        <span class="word-count" id="word-count"></span>
      </div>
      <div id="word-grid"></div>
    </section>

    <!-- ===== 複習頁 ===== -->
    <section id="review-view" hidden>

      <div class="review-mode-toggle">
        <button class="mode-btn active" id="mode-btn-due">今日待複習 <span class="due-badge" id="due-count">0</span></button>
        <button class="mode-btn" id="mode-btn-all">全部隨機</button>
      </div>

      <p class="progress-display" id="progress-display">已複習 0 / 0 個單字</p>

      <div class="card-container">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <span class="card-hint">點擊翻面</span>
            <span class="card-word" id="card-word">—</span>
            <button class="speak-btn speak-btn-card" id="speak-word" title="朗讀單字">🔊</button>
          </div>
          <div class="card-face card-back">
            <span class="card-hint">中文意思</span>
            <span class="card-chinese" id="card-chinese">—</span>
            <div class="sentence-row">
              <p class="card-sentence" id="card-sentence">—</p>
              <button class="speak-btn speak-btn-card" id="speak-sentence" title="朗讀例句">🔊</button>
            </div>
          </div>
        </div>
      </div>

      <div class="translation-display hidden" id="translation-display">
        <p id="card-translation">—</p>
      </div>

      <div class="rating-actions hidden" id="rating-actions">
        <button class="btn btn-remembered" id="btn-remembered">✓ 記得</button>
        <button class="btn btn-forgot" id="btn-forgot">✗ 不記得</button>
      </div>

      <p class="srs-feedback hidden" id="srs-feedback"></p>

      <div class="review-actions">
        <button class="btn btn-outline" id="next-card">跳過</button>
        <button class="btn btn-outline" id="restart-review">重新開始</button>
      </div>
    </section>

    <!-- ===== 文章頁 ===== -->
    <section id="article-view" hidden>
      <div class="article-controls">
        <button class="btn btn-primary" id="btn-regenerate">重新生成</button>
        <button class="btn btn-outline btn-apikey" id="btn-api-key">⚙ API Key</button>
      </div>
      <div id="article-content">
        <div class="article-empty"><p>點擊「重新生成」開始</p></div>
      </div>
      <div id="article-word-list" hidden></div>
    </section>

  </main>

  <!-- API Key Modal -->
  <div class="modal-overlay hidden" id="api-key-modal">
    <div class="modal">
      <h2 class="modal-title">設定 Gemini API Key</h2>
      <p class="modal-desc">
        Key 只存在你的瀏覽器，不會上傳到任何地方。<br>
        前往 <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a> 免費申請。
      </p>
      <input type="password" id="api-key-input" placeholder="貼上你的 Gemini API Key…" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-save-key">儲存並生成</button>
        <button class="btn btn-outline" id="btn-close-modal">取消</button>
        <button class="btn btn-outline btn-danger" id="btn-clear-key">清除 Key</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
